<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12372a" />
    <title>Truco Online</title>
  </head>
  <body>
    <main id="login" class="login-screen">
      <section class="login-content" aria-labelledby="login-title">
        <div class="home-badge">Truco Online</div>
        <h2 id="login-title">Entrar</h2>
        <form id="login-form" class="profile-form">
          <label>
            Email
            <input id="login-email" name="email" type="email" required autocomplete="email" />
          </label>
          <p id="login-message" class="profile-message" aria-live="polite"></p>
          <button class="play-button" type="submit">Entrar</button>
        </form>
      </section>
    </main>
    <main id="home" class="home-screen is-hidden">
      <section class="home-content" aria-labelledby="home-title">
        <div class="home-badge">Truco Online</div>
        <h1 id="home-title">Truco</h1>
        <p>Entre em uma mesa online e jogue uma partida em tempo real.</p>
        <button id="play-online" class="play-button" type="button">
          Jogar online
        </button>
        <button id="open-profile" class="secondary-button menu-button" type="button">
          Perfil
        </button>
        <button id="open-rank" class="secondary-button menu-button" type="button">
          Rank
        </button>
        <button id="open-settings" class="secondary-button menu-button" type="button">
          Configuração
        </button>
      </section>
    </main>
    <main id="profile" class="profile-screen is-hidden">
      <section class="profile-content" aria-labelledby="profile-title">
        <div class="home-badge">Perfil</div>
        <h2 id="profile-title">Seu jogador</h2>
        <form id="profile-form" class="profile-form">
          <label>
            Nome
            <input id="profile-name" name="name" type="text" maxlength="24" required autocomplete="name" />
          </label>
          <label>
            Email
            <input id="profile-email" name="email" type="email" required autocomplete="email" />
          </label>
          <label class="photo-field">
            Foto
            <input id="profile-photo" name="photo" type="file" accept="image/*" />
          </label>
          <img id="profile-preview" class="profile-preview" alt="Foto do perfil" />
          <p id="profile-message" class="profile-message" aria-live="polite"></p>
          <button class="play-button" type="submit">Salvar perfil</button>
        </form>
        <button id="back-home-profile" class="secondary-button" type="button">
          Voltar
        </button>
      </section>
    </main>
    <main id="settings" class="settings-screen is-hidden">
      <section class="settings-content" aria-labelledby="settings-title">
        <div class="home-badge">Configuração</div>
        <h2 id="settings-title">Fundo da mesa</h2>
        <div id="background-options" class="background-options" aria-label="Escolha o fundo da tela do jogo">
          <button class="background-option" type="button" data-background="felt-default">
            <span class="background-preview"></span>
            <span>Default</span>
          </button>
          <button class="background-option" type="button" data-background="felt-teal">
            <span class="background-preview"></span>
            <span>Teal</span>
          </button>
          <button class="background-option" type="button" data-background="felt-emerald">
            <span class="background-preview"></span>
            <span>Emerald</span>
          </button>
          <button class="background-option" type="button" data-background="felt-navy">
            <span class="background-preview"></span>
            <span>Navy</span>
          </button>
          <button class="background-option" type="button" data-background="felt-burgundy">
            <span class="background-preview"></span>
            <span>Burgundy</span>
          </button>
          <button class="background-option" type="button" data-background="felt-charcoal">
            <span class="background-preview"></span>
            <span>Charcoal</span>
          </button>
        </div>
        <h2>Fundo da carta</h2>
        <div id="card-back-options" class="background-options card-back-options" aria-label="Escolha o fundo das cartas">
          <button class="background-option card-back-option" type="button" data-card-back="ivory-emerald">
            <span class="background-preview card-back-preview"></span>
            <span>Ivory</span>
          </button>
          <button class="background-option card-back-option" type="button" data-card-back="crimson-gold">
            <span class="background-preview card-back-preview"></span>
            <span>Crimson</span>
          </button>
          <button class="background-option card-back-option" type="button" data-card-back="royal-blue">
            <span class="background-preview card-back-preview"></span>
            <span>Royal</span>
          </button>
          <button class="background-option card-back-option" type="button" data-card-back="midnight-purple">
            <span class="background-preview card-back-preview"></span>
            <span>Midnight</span>
          </button>
          <button class="background-option card-back-option" type="button" data-card-back="black">
            <span class="background-preview card-back-preview"></span>
            <span>Black</span>
          </button>
          <button class="background-option card-back-option" type="button" data-card-back="gray">
            <span class="background-preview card-back-preview"></span>
            <span>Gray</span>
          </button>
        </div>
        <button id="back-home" class="secondary-button" type="button">
          Voltar
        </button>
      </section>
    </main>
    <main id="rank" class="rank-screen is-hidden">
      <section class="rank-content" aria-labelledby="rank-title">
        <div class="home-badge">Rank</div>
        <h2 id="rank-title">Melhores jogadores</h2>
        <div id="rank-list" class="rank-list" aria-live="polite"></div>
        <button id="back-home-rank" class="secondary-button" type="button">
          Voltar
        </button>
      </section>
    </main>
    <main id="waiting-room" class="waiting-screen is-hidden">
      <section class="waiting-content" aria-labelledby="waiting-title">
        <div class="loading-ring" aria-hidden="true"></div>
        <h2 id="waiting-title">Aguardando jogadores</h2>
        <p id="waiting-message">Procurando outro jogador para iniciar a partida.</p>
        <button id="cancel-waiting" class="secondary-button" type="button">
          Cancelar
        </button>
      </section>
    </main>
    <div id="game" class="is-hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
