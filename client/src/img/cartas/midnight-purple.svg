<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">

  <defs>

    <!-- GOLD -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff4bc"></stop>
      <stop offset=".45" stop-color="#d9ae38"></stop>
      <stop offset="1" stop-color="#714108"></stop>
    </linearGradient>

    <!-- MIDNIGHT PURPLE -->
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#12051f"></stop>
      <stop offset=".45" stop-color="#4b1d7d"></stop>
      <stop offset=".75" stop-color="#2a0d4f"></stop>
      <stop offset="1" stop-color="#06030d"></stop>
    </linearGradient>

    <!-- LIGHT -->
    <radialGradient id="light" cx="50%" cy="40%" r="70%">
      <stop stop-color="#c48cff" stop-opacity=".20"></stop>
      <stop offset=".7" stop-color="#000" stop-opacity=".04"></stop>
      <stop offset="1" stop-color="#000" stop-opacity=".48"></stop>
    </radialGradient>

    <!-- TEXTURE -->
    <pattern id="pattern" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M23 8L30 23L23 38L16 23Z" fill="none" stroke="#d8c1ff" stroke-width="1.3" opacity=".07"></path>
    </pattern>

  </defs>

  <!-- BASE -->
  <rect width="750" height="1050" rx="60" fill="#020103"></rect>

  <!-- OUTER GOLD -->
  <rect x="16" y="16" width="718" height="1018" rx="54" fill="url(#gold)"></rect>

  <!-- DARK FRAME -->
  <rect x="40" y="40" width="670" height="970" rx="44" fill="#05020b"></rect>

  <!-- MAIN PURPLE -->
  <rect x="60" y="60" width="630" height="930" rx="36" fill="url(#purple)"></rect>

  <!-- PATTERN -->
  <rect x="60" y="60" width="630" height="930" rx="36" fill="url(#pattern)"></rect>

  <!-- LIGHT -->
  <rect x="60" y="60" width="630" height="930" rx="36" fill="url(#light)"></rect>

  <!-- MAIN BORDERS -->
  <rect x="86" y="86" width="578" height="878" rx="28" fill="none" stroke="url(#gold)" stroke-width="14"></rect>

  <rect x="112" y="112" width="526" height="826" rx="22" fill="none" stroke="#f1deff" stroke-width="4" opacity=".85"></rect>

  <!-- CORNERS -->
  <g stroke="url(#gold)" stroke-linecap="round" fill="none">

    <!-- TL -->
    <path d="M126 126h110" stroke-width="14"></path>
    <path d="M126 126v110" stroke-width="14"></path>
    <circle cx="126" cy="126" r="16" fill="#f3c13a" stroke="none"></circle>

    <!-- TR -->
    <path d="M624 126h-110" stroke-width="14"></path>
    <path d="M624 126v110" stroke-width="14"></path>
    <circle cx="624" cy="126" r="16" fill="#f3c13a" stroke="none"></circle>

    <!-- BL -->
    <path d="M126 924h110" stroke-width="14"></path>
    <path d="M126 924v-110" stroke-width="14"></path>
    <circle cx="126" cy="924" r="16" fill="#f3c13a" stroke="none"></circle>

    <!-- BR -->
    <path d="M624 924h-110" stroke-width="14"></path>
    <path d="M624 924v-110" stroke-width="14"></path>
    <circle cx="624" cy="924" r="16" fill="#f3c13a" stroke="none"></circle>

  </g>

  <!-- CENTER SYMBOL -->
  <g transform="translate(375 525)">

    <!-- OUTER -->
    <circle r="240" fill="#130522" opacity=".95" stroke="url(#gold)" stroke-width="18"></circle>

    <!-- DIAMOND -->
    <path d="M0-175L175 0L0 175L-175 0Z" fill="#6b2ec9" stroke="url(#gold)" stroke-width="18" stroke-linejoin="round"></path>

    <!-- INNER HIGHLIGHT -->
    <path d="M0-145L145 0L0 145L-145 0Z" fill="none" stroke="#ecd9ff" stroke-width="4" opacity=".5"></path>

    <!-- CENTER COIN -->
    <circle r="72" fill="url(#gold)" stroke="#fff2bc" stroke-width="4"></circle>

    <circle r="58" fill="#efbe34" opacity=".55"></circle>

  </g>

</svg>