<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">

  <defs>

    <!-- GOLD -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff4b0"></stop>
      <stop offset=".45" stop-color="#e1b93f"></stop>
      <stop offset="1" stop-color="#7b4a09"></stop>
    </linearGradient>

    <!-- ROYAL BLUE -->
    <linearGradient id="royal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#03164d"></stop>
      <stop offset=".5" stop-color="#0b36c9"></stop>
      <stop offset="1" stop-color="#02081f"></stop>
    </linearGradient>

    <!-- LIGHT -->
    <radialGradient id="light" cx="50%" cy="40%" r="70%">
      <stop stop-color="#6ea2ff" stop-opacity=".22"></stop>
      <stop offset=".7" stop-color="#000" stop-opacity=".05"></stop>
      <stop offset="1" stop-color="#000" stop-opacity=".45"></stop>
    </radialGradient>

    <!-- TEXTURE -->
    <pattern id="pattern" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M21 7L27 18L21 29L15 18Z" fill="none" stroke="#bcd0ff" stroke-width="1.3" opacity=".08"></path>
    </pattern>

  </defs>

  <!-- BASE -->
  <rect width="750" height="1050" rx="60" fill="#020202"></rect>

  <!-- OUTER GOLD -->
  <rect x="16" y="16" width="718" height="1018" rx="54" fill="url(#gold)"></rect>

  <!-- DARK FRAME -->
  <rect x="40" y="40" width="670" height="970" rx="44" fill="#03040c"></rect>

  <!-- MAIN BLUE -->
  <rect x="60" y="60" width="630" height="930" rx="36" fill="url(#royal)"></rect>

  <!-- PATTERN -->
  <rect x="60" y="60" width="630" height="930" rx="36" fill="url(#pattern)"></rect>

  <!-- LIGHT -->
  <rect x="60" y="60" width="630" height="930" rx="36" fill="url(#light)"></rect>

  <!-- THICK BORDERS -->
  <rect x="86" y="86" width="578" height="878" rx="28" fill="none" stroke="url(#gold)" stroke-width="14"></rect>

  <rect x="112" y="112" width="526" height="826" rx="22" fill="none" stroke="#fff2b6" stroke-width="4" opacity=".9"></rect>

  <!-- CORNERS -->
  <g stroke="url(#gold)" stroke-linecap="round" fill="none">

    <!-- TL -->
    <path d="M126 126h110" stroke-width="14"></path>
    <path d="M126 126v110" stroke-width="14"></path>
    <circle cx="126" cy="126" r="16" fill="#f3c13a" stroke="none"></circle>

    <!-- TR -->
    <path d="M624 126h-110" stroke-width="14"></path>
    <path d="M624 126v110" stroke-width="14"></path>
    <circle cx="624" cy="126" r="16" fill="#f3c13a" stroke="none"></circle>

    <!-- BL -->
    <path d="M126 924h110" stroke-width="14"></path>
    <path d="M126 924v-110" stroke-width="14"></path>
    <circle cx="126" cy="924" r="16" fill="#f3c13a" stroke="none"></circle>

    <!-- BR -->
    <path d="M624 924h-110" stroke-width="14"></path>
    <path d="M624 924v-110" stroke-width="14"></path>
    <circle cx="624" cy="924" r="16" fill="#f3c13a" stroke="none"></circle>

  </g>

  <!-- CENTER SYMBOL -->
  <g transform="translate(375 525)">

    <!-- OUTER -->
    <circle r="240" fill="#020d3f" opacity=".95" stroke="url(#gold)" stroke-width="18"></circle>

    <!-- DIAMOND -->
    <path d="M0-175L175 0L0 175L-175 0Z" fill="#1148ff" stroke="url(#gold)" stroke-width="18" stroke-linejoin="round"></path>

    <!-- INNER HIGHLIGHT -->
    <path d="M0-145L145 0L0 145L-145 0Z" fill="none" stroke="#dbe5ff" stroke-width="4" opacity=".55"></path>

    <!-- CENTER COIN -->
    <circle r="72" fill="url(#gold)" stroke="#fff2b6" stroke-width="4"></circle>

    <circle r="58" fill="#efbe34" opacity=".55"></circle>

  </g>

</svg>