<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="gold" x1="50" y1="20" x2="210" y2="235" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7A8"/>
      <stop offset="0.25" stop-color="#FFD84D"/>
      <stop offset="0.58" stop-color="#C88400"/>
      <stop offset="1" stop-color="#FFEC8A"/>
    </linearGradient>
    <linearGradient id="green" x1="64" y1="38" x2="196" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F6A2B"/>
      <stop offset="0.55" stop-color="#063819"/>
      <stop offset="1" stop-color="#011A0B"/>
    </linearGradient>
    <linearGradient id="face" x1="83" y1="62" x2="178" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#174F2A"/>
      <stop offset="1" stop-color="#052010"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- base circular casino badge -->
  
  
  

  <!-- bot antenna -->
  <path d="M128 58V38" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="128" cy="29" r="12" fill="url(#gold)" stroke="#7A4A00" stroke-width="2"/>

  <!-- robot head -->
  <rect x="63" y="62" width="130" height="98" rx="28" fill="url(#gold)"/>
  <rect x="74" y="73" width="108" height="76" rx="21" fill="url(#face)"/>
  <rect x="82" y="82" width="92" height="58" rx="17" fill="url(#green)" opacity="0.95"/>

  <!-- ears -->
  <rect x="49" y="94" width="18" height="38" rx="9" fill="url(#gold)"/>
  <rect x="189" y="94" width="18" height="38" rx="9" fill="url(#gold)"/>

  <!-- eyes -->
  <circle cx="102" cy="112" r="12" fill="#FFD94A" filter="url(#glow)"/>
  <circle cx="154" cy="112" r="12" fill="#FFD94A" filter="url(#glow)"/>
  <circle cx="102" cy="112" r="5" fill="#FFF7B2"/>
  <circle cx="154" cy="112" r="5" fill="#FFF7B2"/>

  <!-- mouth -->
  <rect x="101" y="134" width="54" height="8" rx="4" fill="#D99500"/>
  <rect x="110" y="134" width="5" height="8" rx="2" fill="#FFF1A0" opacity="0.7"/>
  <rect x="127" y="134" width="5" height="8" rx="2" fill="#FFF1A0" opacity="0.7"/>
  <rect x="144" y="134" width="5" height="8" rx="2" fill="#FFF1A0" opacity="0.7"/>

  <!-- shoulders/player body -->
  <path d="M69 207C76 179 98 164 128 164C158 164 180 179 187 207C189 216 182 224 173 224H83C74 224 67 216 69 207Z" fill="url(#gold)"/>
  <path d="M87 207C93 190 108 180 128 180C148 180 163 190 169 207H87Z" fill="#073A18" opacity="0.95"/>

  <!-- CPU label -->
  <rect x="88" y="176" width="80" height="27" rx="13.5" fill="#051D0E" stroke="url(#gold)" stroke-width="3"/>
  <text x="128" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900" fill="#FFD84D">CPU</text>

  <!-- small card suit detail -->
  
</svg>